<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="iris — Claude Code-native workflow plugin">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1f"/>
      <stop offset="0.55" stop-color="#121734"/>
      <stop offset="1" stop-color="#1a1340"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#5b6cff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#5b6cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cdd6ff"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" rx="28" fill="url(#panel)"/>
  <rect x="0" y="0" width="1200" height="360" rx="28" fill="url(#glow)"/>

  <!-- rainbow bridge / messenger arc -->
  <g fill="none" stroke-linecap="round" stroke-width="6">
    <path d="M 508 150 A 92 92 0 0 1 692 150" stroke="#ff6b6b"/>
    <path d="M 514 150 A 86 86 0 0 1 686 150" stroke="#ffa24b"/>
    <path d="M 520 150 A 80 80 0 0 1 680 150" stroke="#ffd24b"/>
    <path d="M 526 150 A 74 74 0 0 1 674 150" stroke="#54d18a"/>
    <path d="M 532 150 A 68 68 0 0 1 668 150" stroke="#49b6ff"/>
    <path d="M 538 150 A 62 62 0 0 1 662 150" stroke="#6a7bff"/>
    <path d="M 544 150 A 56 56 0 0 1 656 150" stroke="#b06aff"/>
  </g>

  <!-- wordmark -->
  <text x="600" y="252" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="138" font-weight="800" letter-spacing="3" fill="url(#ink)">iris</text>

  <!-- tagline -->
  <text x="600" y="300" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="27" font-weight="500" letter-spacing="0.5" fill="#9aa6d8">Claude Code-native workflow plugin</text>

  <!-- feature row -->
  <text x="600" y="336" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="19" font-weight="500" letter-spacing="2.5" fill="#6c77a6">memory&#160;&#160;·&#160;&#160;backlog-driven run&#160;&#160;·&#160;&#160;swarm&#160;&#160;·&#160;&#160;connect-to-anything</text>
</svg>
